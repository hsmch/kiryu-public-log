name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # data/ に変更がある場合: バリデーションを実行
  validate-data:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.ref == 'auto/data-update' ||
      contains(github.event.pull_request.labels.*.name, 'automated')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm ci

      - name: Validate data quality
        working-directory: pipeline
        run: npm run validate

  # サイトをビルドしてスモークテスト
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright
        working-directory: site
        run: npx playwright install chromium

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Run smoke tests
        working-directory: site
        run: npx playwright test

      - name: Comment deploying status on PR
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = process.env.COMMIT_SHA;
            const marker = '<!-- cf-preview -->';
            const body = `${marker}\n🔄 **プレビューデプロイ中...**\n\nビルド: \`${sha}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Deploy preview to Cloudflare Pages
        id: deploy-preview
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=kiryu-public-log --branch="$BRANCH_NAME"
          workingDirectory: site

      - name: Update preview comment with result
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy-preview.outputs.deployment-url }}
          DEPLOY_OUTCOME: ${{ steps.deploy-preview.outcome }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = process.env.COMMIT_SHA;
            const marker = '<!-- cf-preview -->';
            let body;

            if (process.env.DEPLOY_OUTCOME === 'success' && process.env.DEPLOY_URL) {
              body = `${marker}\n✅ **プレビューデプロイ**: ${process.env.DEPLOY_URL}\n\nビルド: \`${sha}\``;
            } else {
              body = `${marker}\n❌ **プレビューデプロイ失敗**\n\nビルド: \`${sha}\``;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body,
              });
            }
