name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # data/ に変更がある場合: バリデーションを実行
  validate-data:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.ref == 'auto/data-update' ||
      contains(github.event.pull_request.labels.*.name, 'automated')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm ci

      - name: Validate data quality
        working-directory: pipeline
        run: npm run validate

  # サイトをビルドしてスモークテスト
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright
        working-directory: site
        run: npx playwright install chromium

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Run smoke tests
        working-directory: site
        run: npx playwright test

      - name: Deploy preview to Cloudflare Pages
        id: deploy-preview
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=kiryu-public-log --branch=${{ github.head_ref }}
          workingDirectory: site

      - name: Comment preview URL on PR
        if: steps.deploy-preview.outputs.deployment-url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.deployment-url }}';
            const marker = '<!-- cf-preview -->';
            const body = `${marker}\n🔍 **プレビューデプロイ**: ${url}\n\nビルド: \`${{ github.sha }}\``;

            // 既存のプレビューコメントを探す
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
