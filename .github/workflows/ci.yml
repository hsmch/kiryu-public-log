name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # data/ に変更がある場合: バリデーションを実行
  validate-data:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.ref == 'auto/data-update' ||
      contains(github.event.pull_request.labels.*.name, 'automated')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm ci

      - name: Validate data quality
        working-directory: pipeline
        run: npm run validate

  # サイトをビルドしてスモークテスト
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright
        working-directory: site
        run: npx playwright install chromium

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Run smoke tests
        working-directory: site
        run: npx playwright test

      - name: Comment deploying status on PR
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = process.env.COMMIT_SHA;
            const marker = '<!-- cf-preview -->';
            const body = [
              marker,
              '### 🚀 プレビュー環境を準備しています...',
              '',
              `| コミット | \`${sha.slice(0, 7)}\` |`,
              '|---|---|',
              '| ステータス | 🔄 デプロイ中 |',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
              per_page: 100,
              sort: 'updated',
              direction: 'desc',
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            }

      - name: Deploy preview to Cloudflare Pages
        id: deploy-preview
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=kiryu-public-log --branch="$BRANCH_NAME"
          workingDirectory: site

      - name: Update preview comment with result
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy-preview.outputs.deployment-url }}
          DEPLOY_OUTCOME: ${{ steps.deploy-preview.outcome }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = process.env.COMMIT_SHA;
            const marker = '<!-- cf-preview -->';
            const url = process.env.DEPLOY_URL;
            const ok = process.env.DEPLOY_OUTCOME === 'success' && !!url;

            const rows = ok
              ? [
                  `| URL | **[プレビューを開く](${url})** |`,
                  '|---|---|',
                  `| コミット | \`${sha.slice(0, 7)}\` |`,
                  `| ステータス | ✅ デプロイ完了 |`,
                ]
              : [
                  `| コミット | \`${sha.slice(0, 7)}\` |`,
                  '|---|---|',
                  `| ステータス | ❌ デプロイ失敗 |`,
                ];

            const body = [
              marker,
              `### 🚀 プレビュー環境`,
              '',
              ...rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
              per_page: 100,
              sort: 'updated',
              direction: 'desc',
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            }
